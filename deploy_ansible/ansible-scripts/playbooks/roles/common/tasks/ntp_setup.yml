## Config chrony

- name: Chrony config
  template:
    src: 'chrony.conf.j2'
    dest: '{{ chrony_path }}/chrony.conf'
    mode: '0644'
  register: chrony_conf_file

- name: Enable chrony service and start
  service:
    name: '{{ chrony_service }}'
    state: started
    enabled: True

- name: Restart chrony when config is changed
  service:
    name: '{{ chrony_service }}'
    state: restarted
  when: chrony_conf_file is changed
